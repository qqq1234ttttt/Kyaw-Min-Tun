<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KMT</title>

<style>
body{
  margin:0;
  background:black;
  height:100vh;
  font-family:Arial, sans-serif;
  position:relative;
  text-align:center;
}

/* အပေါ်စာ */
.top-text{
  margin-top:40px;
  color:#00ff00;
  font-size:40px;  
  font-weight:bold;
  text-shadow:0 0 10px #00ff00, 0 0 20px #00ff00;
  animation:glow 1.5s infinite alternate;
  line-height:1.6;
}

@keyframes glow{
  from { text-shadow:0 0 5px #00ff00; }
  to { text-shadow:0 0 20px #00ff00, 0 0 30px #00ff00; }
}

/* Logo */
img{
  position:absolute;
  top:75%;   /* အောက်နည်းနည်းချ */
  left:50%;
  transform:translate(-50%, -50%);
  width:420px;        
  max-width:90%;
}

/* Button အပေါ်စာ */
.download-text{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:22px;
  font-weight:bold;
  animation:colorChange 3s infinite;
}

/* ရောင်စုံ animation */
@keyframes colorChange{
  0%{color:red;}
  25%{color:yellow;}
  50%{color:#00ff00;}
  75%{color:cyan;}
  100%{color:magenta;}
}

/* Download Button */
.download-btn{
  position:absolute;
  top:52%;
  left:50%;
  transform:translate(-50%, -50%);
  padding:14px 35px;
  font-size:20px;
  font-weight:bold;
  color:white;
  background:linear-gradient(45deg, red, yellow, lime, cyan, magenta);
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 20px #00ff00;
  transition:0.3s;
}

.download-btn:hover{
  transform:translate(-50%, -50%) scale(1.1);
}
</style>
</head>

<body>

<div class="top-text">
  မင်္ဂလာပါ ✨ <br><br>
  Facebook Service & Software ရေးပေးပါတယ် <br>
  Ph no -09401565816 သို့ဆက်သွယ်စုံစမ်းနိုင်ပါတယ်
</div>

<div class="download-text">
  ယခု Download ပြုလုပ်နိုင်ပါပြီ 👇
</div>

<button class="download-btn" onclick="downloadFile()">
  Download
</button>

<img src="kyawmintunlogo.png">

<script>
function downloadFile(){
  window.location.href="yourfile.apk";
}
</script>

</body>
</html>
